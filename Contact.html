<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | INSTYRNIS</title>
    <link rel="shortcut icon" href="./R1.png" type="image/x-icon" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Plus+Jakarta+Sans:wght@200;400;800&family=Space+Mono&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --ease: cubic-bezier(0.16, 1, 0.3, 1);
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        background: #fff;
        color: #000;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
      }
      .mono {
        font-family: "Space Mono", monospace;
      }
      .sync {
        font-family: "Syncopate", sans-serif;
      }
      .tag {
        border: 1px solid #000;
        padding: 4px 14px;
        font-size: 11px;
        font-weight: 800;
        text-transform: uppercase;
        width: fit-content;
        letter-spacing: 0.1em;
      }
      .btn-solid {
        background: #000;
        color: #fff;
        padding: 0.9rem 2.2rem;
        font-weight: 800;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        border: 2px solid #000;
        transition: all 0.3s;
        display: inline-block;
      }
      .btn-solid:hover {
        background: #fff;
        color: #000;
      }
      .fade {
        opacity: 0;
        transform: translateY(40px);
        transition:
          opacity 0.8s var(--ease),
          transform 0.8s var(--ease);
      }
      .fade.in {
        opacity: 1;
        transform: none;
      }

      /* Minimalist Brutalist Form Fields */
      input,
      textarea {
        width: 100%;
        border: 0;
        border-bottom: 2px solid #000;
        padding: 1.5rem 0;
        font-size: 1.2rem;
        outline: none;
        transition: background 0.3s;
      }
      input:focus,
      textarea:focus {
        background: #f9f9f9;
        padding-left: 1rem;
      }
      label {
        font-family: "Space Mono", monospace;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 2px;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <nav
      class="fixed top-0 w-full z-[100] px-6 py-4 md:px-12 md:py-6 flex justify-between items-center bg-[rgba(255,255,255,0.92)] backdrop-blur-md border-b border-black"
    >
      <a href="index.html" class="sync text-xl font-bold tracking-tighter"
        >INSTYRNIS</a
      >
      <div
        class="hidden md:flex mono gap-8 text-[10px] tracking-widest uppercase"
      >
        <a href="index.html" class="hover:line-through transition">Home</a>
        <a href="about.html" class="hover:line-through transition">About</a>
        <a href="services.html" class="hover:line-through transition"
          >Services</a
        >
        <a href="careers.html" class="hover:line-through transition">Careers</a>
        <a href="contact.html" class="hover:line-through transition underline"
          >Contact</a
        >
      </div>
      <button
        id="menu-btn"
        class="block md:hidden mono text-[11px] font-bold tracking-widest uppercase border border-black px-3 py-1.5"
      >
        MENU
      </button>
    </nav>

    <div class="pt-32 pb-0 md:pt-40 md:px-16 px-6">
      <span class="tag fade">Get in touch</span>
      <h1
        class="fade fd2 sync uppercase"
        style="
          font-size: clamp(2.5rem, 8.5vw, 8.5rem);
          font-weight: 800;
          line-height: 0.85;
          letter-spacing: -0.05em;
          margin-top: 1.5rem;
        "
      >
        SAY HELLO.
      </h1>
    </div>

    <div
      class="grid grid-cols-1 lg:grid-cols-[1fr_1.5fr] mt-20 border-t-8 border-black min-h-screen"
    >
      <div
        class="border-b lg:border-b-0 lg:border-right-8 border-black p-8 md:p-16 bg-gray-50"
      >
        <div class="fade">
          <label>Email Us</label>
          <p class="text-2xl md:text-3xl font-extrabold mb-12 mt-2">
            contact@instyrnis.com
          </p>
        </div>
        <!--<div class="fade">
          <label>Office / Lab</label>
          <p class="text-2xl md:text-3xl font-extrabold mb-12 mt-2">
            221B Baker Street,<br />London, UK
          </p>
        </div>-->
        <div class="fade">
          <label>Socials</label>
          <div
            class="flex gap-4 mt-4 mono text-xs font-bold uppercase underline"
          >
            <a href="#">Twitter</a><a href="#">LinkedIn</a
            ><a href="#">GitHub</a>
          </div>
        </div>
      </div>

      <div class="p-8 md:p-16">
        <form class="grid grid-cols-1 md:grid-cols-2 gap-10">
          <div class="fade">
            <label>Full Name</label>
            <input type="text" placeholder="John Doe" />
          </div>
          <div class="fade">
            <label>Email Address</label>
            <input type="email" placeholder="john@example.com" />
          </div>
          <div class="md:col-span-2 fade">
            <label>Project Scope / Subject</label>
            <input type="text" placeholder="AI Agent Build" />
          </div>
          <div class="md:col-span-2 fade">
            <label>How can we help?</label>
            <textarea
              rows="4"
              placeholder="Tell us about your automation bottlenecks..."
            ></textarea>
          </div>
          <div class="fade pt-6">
            <button type="submit" class="btn-solid w-full md:w-fit text-lg">
              Send Transmission
            </button>
          </div>
        </form>
      </div>
    </div>

    <script>
      const obs = new IntersectionObserver(
        (entries) =>
          entries.forEach((e) => {
            if (e.isIntersecting) e.target.classList.add("in");
          }),
        { threshold: 0.1 },
      );
      document.querySelectorAll(".fade").forEach((el) => obs.observe(el));
      const menuBtn = document.getElementById("menu-btn");
      const mobileMenu = document.getElementById("mobile-menu");
      menuBtn.addEventListener("click", () => {
        mobileMenu.classList.toggle("hidden");
        menuBtn.innerText = mobileMenu.classList.contains("hidden")
          ? "MENU"
          : "CLOSE";
      });

      (function () {
        "use strict";

        // Disable Right Click
        document.addEventListener("contextmenu", function (e) {
          e.preventDefault();
        });

        // Disable Copy
        document.addEventListener("copy", function (e) {
          e.preventDefault();
        });

        // Disable Cut
        document.addEventListener("cut", function (e) {
          e.preventDefault();
        });

        // Disable Paste
        document.addEventListener("paste", function (e) {
          e.preventDefault();
        });

        // Disable Drag
        document.addEventListener("dragstart", function (e) {
          e.preventDefault();
        });

        // Disable Select
        document.addEventListener("selectstart", function (e) {
          e.preventDefault();
        });

        // Disable Common Shortcuts
        document.addEventListener("keydown", function (e) {
          // F12
          if (e.key === "F12") {
            e.preventDefault();
            return false;
          }

          // Ctrl+Shift+I
          if (e.ctrlKey && e.shiftKey && (e.key === "I" || e.key === "i")) {
            e.preventDefault();
            return false;
          }

          // Ctrl+Shift+J
          if (e.ctrlKey && e.shiftKey && (e.key === "J" || e.key === "j")) {
            e.preventDefault();
            return false;
          }

          // Ctrl+Shift+C
          if (e.ctrlKey && e.shiftKey && (e.key === "C" || e.key === "c")) {
            e.preventDefault();
            return false;
          }

          // Ctrl+U
          if (e.ctrlKey && (e.key === "U" || e.key === "u")) {
            e.preventDefault();
            return false;
          }

          // Ctrl+S
          if (e.ctrlKey && (e.key === "S" || e.key === "s")) {
            e.preventDefault();
            return false;
          }

          // Ctrl+A
          if (e.ctrlKey && (e.key === "A" || e.key === "a")) {
            e.preventDefault();
            return false;
          }

          // Ctrl+C
          if (e.ctrlKey && (e.key === "C" || e.key === "c")) {
            e.preventDefault();
            return false;
          }
        });

        // Clear Console
        setInterval(function () {
          console.clear();
        }, 1000);

        // Prevent iframe embedding
        if (window.top !== window.self) {
          window.top.location = window.self.location;
        }

        // Anti Debugger
        setInterval(function () {
          debugger;
        }, 200);
      })();
    </script>
  </body>
</html>
